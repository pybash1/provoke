version: '3.8'

services:
  # Message Queue for decoupled Crawling & Indexing
  redis:
    image: redis:7-alpine
    container_name: provoke-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Optional: Indexer Worker as a service
  # indexer:
  #   build: .
  #   container_name: provoke-indexer
  #   environment:
  #     - REDIS_HOST=redis
  #     - PROVOKE_ENV=development
  #   depends_on:
  #     - redis
  #   volumes:
  #     - .:/app
  #   command: uv run provoke-indexer-worker

volumes:
  redis_data:
