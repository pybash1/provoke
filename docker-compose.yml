version: '3.8'

services:
  # Message Queue & Distributed Bloom Filter
  redis:
    image: redis/redis-stack-server:latest
    container_name: provoke_redis
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis_data:/data
    restart: always

  # Optional: Indexer Worker as a service
  # indexer:
  #   build: .
  #   container_name: provoke_indexer
  #   environment:
  #     - REDIS_HOST=redis
  #     - PROVOKE_ENV=development
  #   depends_on:
  #     - redis
  #   volumes:
  #     - .:/app
  #   command: uv run provoke-indexer-worker

volumes:
  redis_data:
